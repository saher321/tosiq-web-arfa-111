<body>
    
    <!--

    <div class="issue-form">
        <div class="header">
            <div>
                Form
            </div>
            <p>
                Your feedback of assets issue is important to us
            </p>
        </div>
        
        <form>
            <div class="name-field">
                <label>Name</label>

            </div>
            
            <div class="emp-id-field">
                <label>Employee ID</label>
                <input type="text" placeholder="Enter Employee id">
            </div>

            <div class="radio-btns">
                <div>
                    <input type="radio" name="issue">
                    <label for="">Nework issue</label>
                </div>
                <div>
                    <input type="radio" name="issue">
                    <label for="">Wifi issue</label>
                </div>
                <div>
                    <input type="radio" name="issue">
                    <label for="">Laptop issue</label>
                </div>
            </div>

            <div class="submit-btn">
                <button>Submit</button>
            </div>
        </form>
    </div>

</body>
